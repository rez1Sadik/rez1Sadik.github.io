<style>
  .site-footer {
    background-color: #f8f9fa !important;
    padding: 15px 0 !important; /* Heavily reduced vertical padding */
    margin-top: 40px; /* Space between content and footer */
    border-top: 1px solid #e1e4e8;
    color: #586069;
    clear: both;
  }
  .footer-wrapper {
    max-width: 1400px; /* Increased to allow stats to sit further right */
    margin: 0 auto;
    padding: 0 20px;
  }
  .footer-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: nowrap; /* Forces them to stay on one line */
  }
  .github-stats-right {
    display: flex;
    gap: 5px; /* Minimal gap between the two cards */
    align-items: center;
  }
  .github-stats-right img {
    height: 100px; /* Slightly smaller to save space */
    width: auto;
    margin: 0; /* Removes any default image margins */
    display: block;
  }
  .footer-info {
    font-size: 0.6em;
    line-height: 1.4;
    margin: 0;
  }
</style>

<footer class="site-footer">
  <div class="footer-wrapper">
    <div class="footer-bottom">
      
      <div class="footer-info">
        &copy; {{ site.time | date: "%Y" }} <strong>{{ site.author.name }}</strong>
        <br> 
        <span style="color: #888;">Data Manager & Researcher</span>
        <br>
        <span style="font-size: 0.8em; color: #aaa;">Last Updated: {{ "now" | date: "%B %d, 2026" }}</span>
      </div>

       {% comment %}
    
      <div class="github-stats-right">
        <img src="https://github-readme-stats.vercel.app/api?username=rez1Sadik&show_icons=true&theme=transparent&hide_border=true&title_color=5594d2&icon_color=5594d2&text_color=444&padding_rect=0" alt="GitHub Stats">
        
        <img src="https://github-readme-stats.vercel.app/api/top-langs/?username=rez1Sadik&layout=compact&theme=transparent&hide_border=true&title_color=5594d2&text_color=444&padding_rect=0" alt="Top Languages">

        <a href='https://mapmyvisitors.com/web/1c36g'  title='Visit tracker'><img src='https://mapmyvisitors.com/map.png?cl=ffffff&w=a&t=m&d=lSzZfQ2Us9dYiV01T5GNc3tqK2pNAxQX2Mbse6RV51s'/></a>
      </div>
      {% endcomment %}

      
    </div>
    
  </div>
</footer>
