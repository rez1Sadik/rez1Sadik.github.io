<div style="clear: both; width: 100%; text-align: center; padding: 20px; font-size: 0.9em; color: #666; background-color: #f8f9fa; border-top: 1px solid #eaeaea; margin-top: 50px; position: relative; z-index: 10;">
  &copy; {{ site.time | date: '%Y' }} {{ site.name | default: site.title }}. All rights reserved. 
  <br>
  <span style="font-size: 0.85em; color: #888;">Site last updated: {{ site.time | date: "%Y-%m-%d" }}</span>
  <br>
  <div style="margin-top: 10px;">
    {% if site.author.linkedin %}
      <a href="https://linkedin.com/in/{{ site.author.linkedin }}" style="color: #666; text-decoration: none; margin: 0 10px;"><i class="fab fa-linkedin fa-lg"></i></a>
    {% endif %}
    {% if site.author.github %}
      <a href="https://github.com/{{ site.author.github }}" style="color: #666; text-decoration: none; margin: 0 10px;"><i class="fab fa-github fa-lg"></i></a>
    {% endif %}
  </div>
</div>

<a href="#" class="back-to-top" title="Back to top"><i class="fas fa-chevron-up"></i></a>

<style>
  html { 
    scroll-behavior: smooth; 
  }
  
  .back-to-top { 
    position: fixed; 
    bottom: 30px; 
    right: 30px; 
    background-color: #4a4a4a; 
    color: #ffffff !important; 
    padding: 12px 16px; 
    border-radius: 8px; 
    text-decoration: none; 
    font-size: 1.2em; 
    z-index: 1000; 
    opacity: 0.7; 
    transition: all 0.3s ease; 
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }
  
  .back-to-top:hover { 
    opacity: 1; 
    transform: translateY(-3px); 
    background-color: #222222;
  }
</style>
