<style>
  /* Ultra-Compact Academic Footer */
  .site-footer {
    background-color: #fcfcfc !important; 
    padding: 15px 0 !important; /* Cut vertical padding in half */
    margin-top: 40px; 
    border-top: 1px solid #eaeaea;
    color: #555;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  
  .footer-wrapper {
    max-width: 1000px; 
    margin: 0 auto;
    padding: 0 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-left, .footer-center, .footer-right { flex: 1; }

  /* Left Side: Micro-Typography */
  .footer-left {
    text-align: left;
    font-size: 0.75em; /* Shrunk font size */
    line-height: 1.4;  /* Tightened line height */
  }
  .footer-meta {
    color: #8fa0b3;
  }

  /* Center Side: Subtle Quote */
  .footer-center {
    text-align: center;
  }
  .footer-quote {
    font-style: italic;
    font-size: 0.8em; /* Shrunk font size */
    color: #999; /* Made slightly lighter to fade into the background more */
    letter-spacing: 0.05em;
  }

  /* Right Side: Compact Top Button */
  .footer-right {
    text-align: right;
  }
  .back-to-top {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.75em; /* Shrunk font size */
    font-weight: 700;
    text-transform: uppercase;
    color: #8fa0b3;
    text-decoration: none;
    letter-spacing: 0.05em;
    transition: all 0.3s ease;
  }
  .back-to-top:hover {
    color: #2c3e50; 
    transform: translateY(-2px); /* Tighter hover animation */
  }

  /* Mobile responsiveness */
  @media (max-width: 768px) {
    .footer-wrapper {
      flex-direction: column;
      gap: 10px; /* Tighter gap for mobile */
    }
    .footer-left, .footer-center, .footer-right {
      text-align: center;
    }
  }
</style>

<footer class="site-footer">
  <div class="footer-wrapper">
    
    <div class="footer-left">
      &copy; {{ site.time | date: "%Y" }} <strong>{{ site.author.name | default: "Md Rezwane Sadik" }}</strong><br>
      <span class="footer-meta">Last Updated: {{ "now" | date: "%B %d, %Y" }}</span>
    </div>

    <div class="footer-center">
      <span class="footer-quote">"Live, Love, Laugh!"</span>
    </div>

    <div class="footer-right">
      <a href="#" class="back-to-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'}); return false;">
        Top <i class="fas fa-arrow-up"></i>
      </a>
    </div>

  </div>
</footer>
