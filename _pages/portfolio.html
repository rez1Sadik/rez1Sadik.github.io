<style>
  /* Minimalist Academic Badge Styling - Matched to Bio & Pubs */
  :root {
    --primary-color: #2c3e50;
    --text-main: #3b3b3b;
    --bg-light: #fdfdfd;
    --border-light: #eaeaea;
  }

  .skill-category {
    margin-bottom: 45px;
  }
  
  /* Matched exactly to your .section-title style */
  .skill-category h3 {
    margin-top: 0px; 
    border-bottom: 1px solid var(--border-light); 
    padding-bottom: 8px; 
    text-transform: uppercase; 
    color: var(--primary-color);
    font-size: 1.15em !important; 
    letter-spacing: 0.05em;
    font-weight: 600;
    margin-bottom: 20px;
  }
  
  .badge-container {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }
  
  /* Academic Tag Style */
  .skill-badge {
    display: flex;
    align-items: center;
    background-color: var(--bg-light);
    border: 1px solid var(--border-light);
    padding: 8px 16px;
    border-radius: 4px; 
    font-size: 0.95em;
    color: #555;
    font-weight: 500;
    transition: all 0.3s ease;
    box-shadow: 0 1px 2px rgba(0,0,0,0.02);
  }
  
  /* Grayscale logos by default for a clean look */
  .skill-badge img {
    width: 18px;
    height: 18px;
    margin-right: 10px;
    object-fit: contain;
    filter: grayscale(100%) opacity(70%);
    transition: all 0.3s ease;
  }

  /* Sophisticated Hover Effect */
  .skill-badge:hover {
    transform: translateY(-3px);
    border-color: var(--primary-color);
    color: var(--primary-color);
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    cursor: default;
  }
  
  /* Snap to full color on hover */
  .skill-badge:hover img {
    filter: grayscale(0%) opacity(100%);
  }

  /* Eye-Soothing Mobile Responsiveness */
  @media (max-width: 768px) {
    .badge-container {
      gap: 10px;
    }
    .skill-badge {
      padding: 6px 12px;
      font-size: 0.85em;
    }
    .skill-badge img {
      width: 16px;
      height: 16px;
      margin-right: 8px;
    }
    .skill-category {
      margin-bottom: 35px;
    }
  }
</style>
